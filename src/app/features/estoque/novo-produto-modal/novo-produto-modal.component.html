<p-dialog
  [header]="titulo"
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!salvando"
  [style]="{ width: '520px' }"
  [breakpoints]="{'768px': '95vw'}"
  [contentStyle]="{ padding: '0' }"
  (onHide)="fechar.emit()"
>

  <hr>

  <div class="flex flex-col gap-[18px] px-6 py-5">

    <!-- Nome -->
    <div>
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">
        Nome <span class="text-red-500">*</span>
      </div>
      <input
        pInputText
        [(ngModel)]="form.nome"
        placeholder="Ex: Cimento CP-II"
        class="w-full text-sm"
      />
    </div>

    <!-- Descrição -->
    <div>
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">Descrição</div>
      <input
        pInputText
        [(ngModel)]="form.descricao"
        placeholder="Opcional"
        class="w-full text-sm"
      />
    </div>

    <!-- Custo de compra -->
    <div>
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">
        Custo de compra <span class="text-red-500">*</span>
      </div>
      <p-inputnumber
        [(ngModel)]="form.valorCompra"
        mode="currency"
        currency="BRL"
        locale="pt-BR"
        [minFractionDigits]="2"
        class="w-full"
      />
    </div>

    <!-- Preço e Unidade -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">
          Preço unitário <span class="text-red-500">*</span>
        </div>
        <p-inputnumber
          [(ngModel)]="form.preco"
          mode="currency"
          currency="BRL"
          locale="pt-BR"
          [minFractionDigits]="2"
          class="w-full"
        />
      </div>
      <div>
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">
          Unidade <span class="text-red-500">*</span>
        </div>
        <app-select-search
          [(ngModel)]="form.medida"
          [options]="unidades"
          placeholder="Selecionar unidade…" />
      </div>
    </div>

    <!-- Quantidade + Estoque mínimo -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div>
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">
          {{ isEdicao ? 'Quantidade em estoque' : 'Quantidade inicial' }}
        </div>
        <p-inputnumber [(ngModel)]="form.quantidadeEstoque" [min]="0" class="w-full" />
      </div>
      <div>
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-1.5">Estoque mínimo</div>
        <p-inputnumber [(ngModel)]="form.estoqueMinimo" [min]="0" class="w-full" />
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-100 bg-slate-50">
    <button
      type="button"
      [disabled]="salvando"
      (click)="fechar.emit()"
      class="px-4 py-[7px] text-[13px] font-medium text-gray-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer disabled:opacity-50">
      Cancelar
    </button>
    <button
      type="button"
      [disabled]="!formValido || salvando"
      (click)="onSalvar()"
      class="px-4 py-[7px] text-[13px] font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>

</p-dialog>
