<p-dialog
  [header]="titulo"
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!salvando"
  [style]="{ width: '520px' }"
  [breakpoints]="{'768px': '95vw'}"
  [contentStyle]="{ padding: '0' }"
  (onHide)="fechar.emit()">

  <hr>

  <form [formGroup]="form" class="flex flex-col gap-[18px] px-6 py-5">

    <!-- Nome -->
    <div class="flex flex-col gap-1.5">
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">
        Nome <span class="text-red-500">*</span>
      </div>
      <input type="text" formControlName="nome"
        placeholder="Ex: Cimento CP-II"
        class="w-full px-3 py-2 text-sm border rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400 transition-colors"
        [class.border-red-400]="form.get('nome')?.invalid && form.get('nome')?.touched"
        [class.border-slate-200]="!(form.get('nome')?.invalid && form.get('nome')?.touched)" />
      <app-field-error [control]="form.get('nome')" />
    </div>

    <!-- Descrição -->
    <div class="flex flex-col gap-1.5">
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">Descrição</div>
      <input type="text" formControlName="descricao"
        placeholder="Opcional"
        class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400 transition-colors" />
    </div>

    <!-- Custo de compra -->
    <div class="flex flex-col gap-1.5">
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">
        Custo de compra <span class="text-red-500">*</span>
      </div>
      <p-inputnumber formControlName="valorCompra"
        mode="currency" currency="BRL" locale="pt-BR" [minFractionDigits]="2"
        class="w-full"
        [class.ng-invalid]="form.get('valorCompra')?.invalid && form.get('valorCompra')?.touched" />
      <app-field-error [control]="form.get('valorCompra')" />
    </div>

    <!-- Preço + Unidade -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">
          Preço unitário <span class="text-red-500">*</span>
        </div>
        <p-inputnumber formControlName="preco"
          mode="currency" currency="BRL" locale="pt-BR" [minFractionDigits]="2"
          class="w-full" />
        <app-field-error [control]="form.get('preco')" />
      </div>
      <div class="flex flex-col gap-1.5">
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">
          Unidade <span class="text-red-500">*</span>
        </div>
        <app-select-search formControlName="medida"
          [options]="unidades"
          placeholder="Selecionar unidade…" />
        <app-field-error [control]="form.get('medida')" />
      </div>
    </div>

    <!-- Quantidade + Estoque mínimo -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">
          {{ isEdicao ? 'Quantidade em estoque' : 'Quantidade inicial' }}
        </div>
        <p-inputnumber formControlName="quantidadeEstoque" [min]="0" class="w-full" />
      </div>
      <div class="flex flex-col gap-1.5">
        <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em]">Estoque mínimo</div>
        <p-inputnumber formControlName="estoqueMinimo" [min]="0" class="w-full" />
      </div>
    </div>

  </form>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-100 bg-slate-50">
    <button type="button" [disabled]="salvando" (click)="fechar.emit()"
      class="px-4 py-[7px] text-[13px] font-medium text-gray-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer disabled:opacity-50">
      Cancelar
    </button>
    <button type="button" [disabled]="salvando" (click)="onSalvar()"
      class="px-4 py-[7px] text-[13px] font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
      {{ salvando ? 'Salvando...' : 'Salvar' }}
    </button>
  </div>

</p-dialog>
