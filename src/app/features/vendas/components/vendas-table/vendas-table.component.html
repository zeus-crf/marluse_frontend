<p-confirmDialog />

<p-table
  [value]="pedidos"
  [loading]="loading"
  dataKey="id"
  [tableStyle]="{ 'min-width': '60rem' }"
  styleClass="p-datatable-sm"
>

  <!-- Cabeçalho -->
  <ng-template #header>
    <tr>
      <th style="width: 8%">N°</th>
      <th style="width: 12%">Data</th>
      <th style="width: 20%">Cliente</th>
      <th style="width: 30%">Produtos</th>
      <th style="width: 14%">Total</th>
      <th style="width: 10%">Status</th>
      <th style="width: 10%"></th>
    </tr>
  </ng-template>

  <!-- Linhas -->
  <ng-template #body let-pedido let-ri="rowIndex">
    <tr>
      <td class="font-mono text-sm text-gray-500">{{ numeroVenda(ri) }}</td>
      <td class="text-sm text-gray-600">{{ formatData(pedido.createdAt) }}</td>
      <td class="text-sm font-medium text-gray-800">{{ pedido.clienteNome }}</td>
      <td class="text-sm text-gray-500 truncate max-w-xs">{{ formatProdutos(pedido) }}</td>
      <td class="text-sm font-semibold text-gray-800">{{ formatCurrency(pedido.valorTotal) }}</td>
      <td>
        <p-tag
          [value]="getStatusLabel(pedido.status)"
          [severity]="getSeverity(pedido.status)"
        />
      </td>
      <td>
        <div class="flex items-center gap-1">
          <button
            pButton
            pRipple
            type="button"
            icon="pi pi-eye"
            text
            rounded
            severity="secondary"
            pTooltip="Visualizar"
            tooltipPosition="top"
            (click)="verDetalhe.emit(pedido)"
          ></button>
          <button
            pButton
            pRipple
            type="button"
            icon="pi pi-pencil"
            text
            rounded
            severity="secondary"
            pTooltip="Editar"
            tooltipPosition="top"
            (click)="editar.emit(pedido)"
          ></button>
          <button
            pButton
            pRipple
            type="button"
            icon="pi pi-trash"
            text
            rounded
            severity="danger"
            pTooltip="Excluir"
            tooltipPosition="top"
            (click)="confirmarExclusao(pedido)"
          ></button>
        </div>
      </td>
    </tr>
  </ng-template>

  <!-- Empty state -->
  <ng-template #emptymessage>
    <tr>
      <td colspan="7" class="text-center py-10 text-gray-400 text-sm">
        Nenhuma venda encontrada
      </td>
    </tr>
  </ng-template>

</p-table>
