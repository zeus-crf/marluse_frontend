<p-dialog
  header="Editar lançamento"
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '520px' }"
  [breakpoints]="{'768px': '95vw'}"
  [contentStyle]="{ padding: '0' }"
  (onHide)="onFechar()">

<hr>
  <form [formGroup]="form" class="flex flex-col gap-4 px-6 py-5">

    <!-- Tipo -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-gray-700">Tipo</label>
      <div class="flex gap-2">
        <button type="button" (click)="setTipo('RECEITA')"
          class="flex-1 py-2 text-sm font-medium rounded-lg border transition-colors"
          [ngClass]="tipo === 'RECEITA'
            ? 'border-green-400 bg-green-50 text-green-700'
            : 'border-slate-200 text-gray-500 hover:bg-slate-50'">
          <i class="pi pi-arrow-down mr-1.5"></i>Receita
        </button>
        <button type="button" (click)="setTipo('DESPESA')"
          class="flex-1 py-2 text-sm font-medium rounded-lg border transition-colors"
          [ngClass]="tipo === 'DESPESA'
            ? 'border-red-400 bg-red-50 text-red-700'
            : 'border-slate-200 text-gray-500 hover:bg-slate-50'">
          <i class="pi pi-arrow-up mr-1.5"></i>Despesa
        </button>
      </div>
    </div>

    <!-- Descrição -->
    <div class="flex flex-col gap-1.5">
      <label class="text-sm font-medium text-gray-700">Descrição <span class="text-red-500">*</span></label>
      <input type="text" formControlName="descricao"
        placeholder="Ex.: Aluguel do galpão..."
        class="w-full px-3 py-2 text-sm border rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400 transition-colors"
        [class.border-red-400]="form.get('descricao')?.invalid && form.get('descricao')?.touched"
        [class.border-slate-200]="!(form.get('descricao')?.invalid && form.get('descricao')?.touched)" />
      @if (form.get('descricao') | fieldError; as msg) {
        <span class="text-xs text-red-500 mt-0.5 flex items-center gap-1">
          <i class="pi pi-times-circle text-[10px]"></i>{{ msg }}
        </span>
      }
    </div>

    <!-- Categoria + Valor -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Categoria <span class="text-red-500">*</span></label>
        <input type="text" formControlName="categoria"
          list="categorias-edicao-list"
          placeholder="Selecione ou digite"
          class="w-full px-3 py-2 text-sm border rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400 transition-colors"
          [class.border-red-400]="form.get('categoria')?.invalid && form.get('categoria')?.touched"
          [class.border-slate-200]="!(form.get('categoria')?.invalid && form.get('categoria')?.touched)" />
        <datalist id="categorias-edicao-list">
          @for (c of categoriasSugeridas; track c) {
            <option value="{{ c }}"></option>
          }
        </datalist>
        @if (form.get('categoria') | fieldError; as msg) {
          <span class="text-xs text-red-500 mt-0.5 flex items-center gap-1">
            <i class="pi pi-times-circle text-[10px]"></i>{{ msg }}
          </span>
        }
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Valor (R$) <span class="text-red-500">*</span></label>
        <input type="number" formControlName="valor"
          placeholder="0,00" min="0" step="0.01"
          class="w-full px-3 py-2 text-sm border rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400 transition-colors"
          [class.border-red-400]="form.get('valor')?.invalid && form.get('valor')?.touched"
          [class.border-slate-200]="!(form.get('valor')?.invalid && form.get('valor')?.touched)" />
        @if (form.get('valor') | fieldError; as msg) {
          <span class="text-xs text-red-500 mt-0.5 flex items-center gap-1">
            <i class="pi pi-times-circle text-[10px]"></i>{{ msg }}
          </span>
        }
      </div>
    </div>

    <!-- Data + Status -->
    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Data de vencimento <span class="text-red-500">*</span></label>
        <app-date-picker formControlName="dataVencimento" />
        @if (form.get('dataVencimento') | fieldError; as msg) {
          <span class="text-xs text-red-500 mt-0.5 flex items-center gap-1">
            <i class="pi pi-times-circle text-[10px]"></i>{{ msg }}
          </span>
        }
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Status</label>
        <app-select formControlName="status" [options]="opcoesStatus" placeholder="Status" />
      </div>
    </div>

  </form>

  <!-- Footer -->
  <div class="flex items-center justify-end gap-2 px-6 py-4 border-t border-slate-100 bg-slate-50">
    <button type="button" (click)="onFechar()"
      class="px-4 py-[7px] text-[13px] font-medium text-gray-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
      Cancelar
    </button>
    <button type="button" (click)="onSalvar()" [disabled]="salvando"
      class="px-4 py-[7px] text-[13px] font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
      {{ salvando ? 'Salvando...' : 'Salvar alterações' }}
    </button>
  </div>

</p-dialog>
