<p-dialog
  header="Filtros"
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '460px' }"
  [breakpoints]="{'768px': '95vw'}"
  [contentStyle]="{ padding: '0' }"
  (onHide)="onFechar()">

<hr>
  <div class="flex flex-col gap-5 px-6 py-5">

    <!-- Status -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Status</label>
      <div class="flex flex-wrap gap-2">
        @for (opt of [
          { label: 'Todos',     value: 'TODOS'     },
          { label: 'Pendente',  value: 'PENDENTE'  },
          { label: 'Pago',      value: 'PAGO'      },
          { label: 'Vencido',   value: 'VENCIDO'   },
          { label: 'Cancelado', value: 'CANCELADO' }
        ]; track opt.value) {
          <button
            type="button"
            (click)="status = $any(opt.value)"
            class="px-3 py-1.5 text-xs font-medium rounded-lg border transition-colors"
            [ngClass]="status === opt.value
              ? 'border-blue-400 bg-blue-50 text-blue-700'
              : 'border-slate-200 text-gray-500 hover:bg-slate-50'">
            {{ opt.label }}
          </button>
        }
      </div>
    </div>

    <!-- Período de vencimento -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Período de vencimento</label>
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <span class="text-xs text-gray-400">De</span>
          <app-date-picker [(ngModel)]="dataInicial" />
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-xs text-gray-400">Até</span>
          <app-date-picker [(ngModel)]="dataFinal" />
        </div>
      </div>
    </div>

    <!-- Faixa de valor -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Faixa de valor (R$)</label>
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <span class="text-xs text-gray-400">Mínimo</span>
          <input
            type="number"
            [(ngModel)]="minValor"
            placeholder="0,00"
            min="0"
            step="0.01"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400"
          />
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-xs text-gray-400">Máximo</span>
          <input
            type="number"
            [(ngModel)]="maxValor"
            placeholder="Sem limite"
            min="0"
            step="0.01"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400"
          />
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div class="bg-slate-50 rounded-lg px-4 py-3 flex items-center justify-between">
      <span class="text-sm text-gray-500">Lançamentos encontrados</span>
      <span class="text-sm font-bold text-blue-600">{{ totalFiltrado }}</span>
    </div>

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 bg-slate-50">
    <button
      type="button"
      (click)="onLimpar()"
      class="flex items-center gap-1.5 text-[13px] font-medium transition-colors"
      [ngClass]="temFiltroAtivo
        ? 'text-red-500 hover:text-red-700 cursor-pointer'
        : 'text-gray-300 cursor-not-allowed pointer-events-none'">
      <i class="pi pi-times-circle text-[13px]"></i>
      Limpar filtros
    </button>
    
    <div class="flex gap-2">
      <button type="button" (click)="onFechar()"
        class="px-4 py-[7px] text-[13px] font-medium text-gray-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
        Cancelar
      </button>
      <button type="button" (click)="onAplicar()"
        class="px-4 py-[7px] text-[13px] font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer">
        Aplicar
      </button>
    </div>
  </div>

</p-dialog>
