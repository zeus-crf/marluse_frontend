<p-dialog
  header="Filtros"
  [visible]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '440px' }"
  [breakpoints]="{'768px': '95vw'}"
  [contentStyle]="{ padding: '0' }"
  (onHide)="fechar.emit()">

 <div class="sticky top-0 bg-white z-10">
  <hr>
</div>

  <div class="flex flex-col gap-5 px-6 py-5">

    <!-- Tipo de cliente -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Tipo de cliente</label>
      <div class="flex gap-2">
        @for (opt of [
          { valor: 'TODOS', label: 'Todos' },
          { valor: 'PF',    label: 'Pessoa Física' },
          { valor: 'PJ',    label: 'Pessoa Jurídica' }
        ]; track opt.valor) {
          <button
            type="button"
            (click)="tipoCliente = $any(opt.valor)"
            class="flex-1 py-2 text-xs font-medium rounded-lg border transition-colors"
            [ngClass]="tipoCliente === opt.valor
              ? 'border-blue-400 bg-blue-50 text-blue-700'
              : 'border-slate-200 text-gray-500 hover:bg-slate-50'">
            {{ opt.label }}
          </button>
        }
      </div>
    </div>

    <!-- Total gasto (min / max) -->
    <div class="flex flex-col gap-2">
      <label class="text-sm font-medium text-gray-700">Total gasto (R$)</label>
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <span class="text-xs text-gray-400">Mínimo</span>
          <input
            type="number"
            [(ngModel)]="minCompras"
            placeholder="0,00"
            min="0"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400"
          />
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-xs text-gray-400">Máximo</span>
          <input
            type="number"
            [(ngModel)]="maxCompras"
            placeholder="Sem limite"
            min="0"
            class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-400 text-gray-700 placeholder:text-gray-400"
          />
        </div>
      </div>
    </div>

    <!-- Preview -->
    <div class="flex items-center gap-2 bg-slate-50 rounded-lg px-3 py-2.5">
      <i class="pi pi-users text-gray-400 text-sm"></i>
      <span class="text-sm text-gray-600">
        <strong class="text-gray-900">{{ totalFiltrado }}</strong> cliente(s) com esses filtros
      </span>
    </div>

  </div>

  <!-- Footer -->
  <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 bg-slate-50">
    <button type="button" (click)="onLimpar()"
      class="flex items-center gap-1.5 text-[13px] font-medium transition-colors"
      [ngClass]="temFiltroAtivo
        ? 'text-red-500 hover:text-red-700 cursor-pointer'
        : 'text-gray-300 cursor-not-allowed pointer-events-none'">
      <i class="pi pi-times-circle text-[13px]"></i>
      Limpar filtros
    </button>
    <div class="flex gap-2">
      <button type="button" (click)="fechar.emit()"
        class="px-4 py-[7px] text-[13px] font-medium text-gray-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
        Cancelar
      </button>
      <button type="button" (click)="onAplicar()"
        class="px-4 py-[7px] text-[13px] font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-colors cursor-pointer">
        Aplicar
      </button>
    </div>
  </div>

</p-dialog>
