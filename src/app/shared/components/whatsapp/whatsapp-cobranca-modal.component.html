<p-dialog
  [visible]="visible"
  (visibleChange)="fecharModal()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '480px' }"
  [contentStyle]="{ padding: '0' }">

  <ng-template pTemplate="header">
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-5 h-5 fill-[#25D366] flex-shrink-0" aria-hidden="true">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      <span class="text-[14px] font-semibold text-gray-800">Cobrar via WhatsApp</span>
    </div>
  </ng-template>

  <hr>

  <div class="flex flex-col gap-4 px-6 py-5">

    <!-- Info do cliente -->
    <div class="flex items-center gap-3 px-3 py-2.5 bg-slate-50 rounded-lg border border-slate-200">
      <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center flex-shrink-0">
        <span class="text-[12px] font-bold text-green-700">{{ clienteNome.charAt(0).toUpperCase() }}</span>
      </div>
      <div>
        <div class="text-[13px] font-semibold text-gray-800">{{ clienteNome }}</div>
        <div class="text-[12px]" [class.text-gray-500]="telefone" [class.text-gray-400]="!telefone">
          {{ telefoneFormatado }}
        </div>
      </div>
    </div>

    <!-- Textarea de mensagem -->
    <div>
      <div class="text-[11px] font-semibold text-gray-400 uppercase tracking-[0.06em] mb-2">
        Mensagem <span class="text-[10px] font-normal normal-case text-gray-400">— edite se quiser</span>
      </div>
      <textarea
        [(ngModel)]="mensagemEditavel"
        rows="6"
        class="w-full bg-white border border-slate-200 rounded-lg px-3 py-[9px] text-[13px] text-gray-800 font-[inherit] outline-none resize-y focus:border-green-400 transition-colors leading-relaxed">
      </textarea>
    </div>

    <!-- Ações -->
    <div class="flex justify-end gap-2 pt-1 border-t border-slate-100">
      <button type="button" (click)="fecharModal()"
        class="px-4 py-[7px] text-[13px] font-medium text-gray-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer">
        Cancelar
      </button>
      <button
        type="button"
        (click)="abrirWhatsApp()"
        [disabled]="!telefone"
        [title]="!telefone ? 'Cliente sem telefone cadastrado' : ''"
        class="flex items-center gap-2 px-4 py-[7px] text-[13px] font-semibold text-white rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
        style="background-color: #25D366;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="w-4 h-4 fill-white flex-shrink-0" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Abrir WhatsApp
      </button>
    </div>

  </div>

</p-dialog>
